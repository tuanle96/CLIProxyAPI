# =============================================================================
# CLIProxyAPI config — OpenCode Go preset
# =============================================================================
# Drop-in config for using OpenCode Go (https://opencode.ai/go) as the upstream
# provider, with phantom-model aliases pre-configured for known coding clients
# (Codex CLI Memory Writing Agent, etc.).
#
# Usage:
#   1. Copy to config.yaml:
#        cp config.opencode-go.example.yaml config.yaml
#   2. Fill in:
#        - remote-management.secret-key   (your management UI password)
#        - api-keys                       (the proxy API key your clients use)
#        - openai-compatibility[0].api-key-entries[0].api-key
#                                         (sk-... from https://opencode.ai/auth)
#   3. Start the proxy:
#        ./cli-proxy-api --config ./config.yaml
#   4. (Optional) front it with vision-router on the same port — see
#      ../vision-router/README.md.
# =============================================================================

# Bind to localhost only by default. Use "" or "0.0.0.0" for remote access
# (and review remote-management.allow-remote below).
host: "127.0.0.1"

# When using vision-router as a front-door on 8317, set CLIProxyAPI to 8327.
# When running CLIProxyAPI alone, use 8317.
port: 8327

tls:
  enable: false
  cert: ""
  key: ""

remote-management:
  allow-remote: false
  # Plaintext on first start — will be hashed in place.
  # CHANGE THIS before deploying.
  secret-key: "CHANGE_ME"
  disable-control-panel: false
  panel-github-repository: "https://github.com/tuanle96/Cli-Proxy-API-Management-Center"

auth-dir: "~/.cli-proxy-api"

# Proxy API keys clients use to call this server.
# CHANGE THESE before deploying.
api-keys:
  - "CHANGE_ME_proxy_api_key"

debug: false

pprof:
  enable: false
  addr: "127.0.0.1:8316"

commercial-mode: false

logging-to-file: false
logs-max-total-size-mb: 0
error-logs-max-files: 10

usage-statistics-enabled: true

usage-store:
  type: memory
  dsn: ""
  schema: ""
  events-table: usage_events
  hourly-rollup-table: usage_rollups_hourly
  daily-rollup-table: usage_rollups_daily
  rollups-enabled: true
  rollup-query-min-events: 50000

usage-quota-rules: []

# =============================================================================
# OpenCode Go upstream
# =============================================================================
# OpenCode Go subscription: $5 first month, $10/month after.
#   Endpoint     : https://opencode.ai/zen/go/v1/{chat/completions,models}
#   API key      : https://opencode.ai/auth (subscribe to Go, copy key)
#   Limits       : $12 / 5h, $30 / week, $60 / month
#
# Model pool last verified 2026-05-28 against /v1/models. If OpenCode Go adds
# or renames models you can:
#   curl -H "Authorization: Bearer $KEY" https://opencode.ai/zen/go/v1/models
# and update the list below.
# =============================================================================
openai-compatibility:
  - name: "opencode-go"
    base-url: "https://opencode.ai/zen/go/v1"
    api-key-entries:
      - api-key: "CHANGE_ME_sk-opencode-..."  # from https://opencode.ai/auth
    models:
      # ----- Real models exposed by OpenCode Go ------------------------------
      - { name: "glm-5",             alias: "glm-5" }
      - { name: "glm-5.1",           alias: "glm-5.1" }
      - { name: "kimi-k2.5",         alias: "kimi-k2.5" }
      - { name: "kimi-k2.6",         alias: "kimi-k2.6" }
      - { name: "deepseek-v4-pro",   alias: "deepseek-v4-pro" }
      - { name: "deepseek-v4-flash", alias: "deepseek-v4-flash" }
      - { name: "minimax-m2.5",      alias: "minimax-m2.5" }
      - { name: "minimax-m2.7",      alias: "minimax-m2.7" }
      - { name: "mimo-v2.5",         alias: "mimo-v2.5" }
      - { name: "mimo-v2.5-pro",     alias: "mimo-v2.5-pro" }
      - { name: "mimo-v2-pro",       alias: "mimo-v2-pro" }
      - { name: "mimo-v2-omni",      alias: "mimo-v2-omni" }
      - { name: "qwen3.5-plus",      alias: "qwen3.5-plus" }
      - { name: "qwen3.6-plus",      alias: "qwen3.6-plus" }
      - { name: "qwen3.7-max",       alias: "qwen3.7-max" }
      - { name: "hy3-preview",       alias: "hy3-preview" }

      # ----- Phantom-model aliases for client subagents ----------------------
      # Coding clients sometimes hardcode small "helper" models for background
      # subagents (memory writing, summarization, compaction). Without an
      # alias, these calls fail with 502 "unknown provider for model X".
      #
      # Codex CLI 0.133+:
      #   - "Memory Writing Agent" (post-rollout summarizer) — gpt-5.4-mini
      #     reasoning.effort=low, ~30 KB system prompt, no tools, 1 user msg.
      #     deepseek-v4-flash is a good target (large quota, fast, cheap).
      - { name: "deepseek-v4-flash", alias: "gpt-5.4-mini" }
      #
      # Add new entries here when CLIProxyAPI logs show
      #   POST /v1/responses ... 502 ... "unknown provider for model X"
      # Pick a small/cheap target from the OpenCode Go list above.
      # Example template:
      #   - { name: "<real-model>",  alias: "<phantom-model>" }
